        * {

            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 800px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 1.1em;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-weight: 600;
            color: #333;
            font-size: 0.9em;
        }

        select, button {
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
            transition: all 0.3s;
            background: white;
            cursor: pointer;
        }

        select:hover {
            border-color: #667eea;
        }

        select:focus, button:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .generate-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            font-weight: 600;
            font-size: 1.1em;
            cursor: pointer;
            grid-column: 1 / -1;
            padding: 15px;
        }

        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .generate-btn:active {
            transform: translateY(0);
        }

        .result-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            margin-bottom: 20px;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .name-display h2 {
            font-size: 2.5em;
            color: #333;
            margin-bottom: 15px;
            word-break: break-word;
        }

        .name-details {
            color: #666;
            font-size: 1.1em;
            line-height: 1.6;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            color: #666;
            font-size: 0.9em;
        }

        .copy-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .copy-btn:hover {
            background: #218838;
            transform: translateY(-2px);
        }

        .copy-btn.copied {
            background: #ffc107;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            
            h1 {

            }

        // Populate country dropdown
        function populateCountries() {
            const countrySelect = document.getElementById('country');
            countrySelect.innerHTML = '<option value="random">Random Country</option>';
            
            Object.keys(nameDatabase.countries).forEach(code => {
                const option = document.createElement('option');
                option.value = code;
                option.textContent = nameDatabase.countries[code].name;
                countrySelect.appendChild(option);
            });
        }

        // Populate language dropdown
        function populateLanguages() {
            const languageSelect = document.getElementById('language');
            languageSelect.innerHTML = '<option value="random">Random Script</option>';
            
            Object.keys(nameDatabase.languageScripts).forEach(script => {
                const option = document.createElement('option');
                option.value = script;
                option.textContent = script;
                languageSelect.appendChild(option);
            });
        }

        // Generate random name
        function generateName() {
            const countrySelect = document.getElementById('country');
            const genderSelect = document.getElementById('gender');
            
            let country = countrySelect.value;
            let gender = genderSelect.value;

            // Random country if selected
            if (country === 'random') {
                const countries = Object.keys(nameDatabase.countries);
                country = countries[Math.floor(Math.random() * countries.length)];
            }

            // Random gender if selected
            if (gender === 'random') {
                gender = Math.random() < 0.5 ? 'male' : 'female';
            }

            // Get names for country, fallback to US if not found
            const firstNames = nameDatabase.firstNames[gender][country] || nameDatabase.firstNames[gender]['US'];
            const lastNames = nameDatabase.lastNames[country] || nameDatabase.lastNames['US'];

            const firstName = firstNames[Math.floor(Math.random() * firstNames.length)];
            const lastName = lastNames[Math.floor(Math.random() * lastNames.length)];
            
            const fullName = `${firstName} ${lastName}`;
            const countryName = nameDatabase.countries[country].name;
            const language = nameDatabase.countries[country].language;

            // Update display
            document.getElementById('generatedName').textContent = fullName;
            document.getElementById('nameDetails').innerHTML = `
                <strong>Country:</strong> ${countryName}<br>
                <strong>Language:</strong> ${language}<br>
                <strong>Gender:</strong> ${gender.charAt(0).toUpperCase() + gender.slice(1)}
            `;

            // Show copy button
            document.getElementById('copyBtn').style.display = 'inline-block';
            document.getElementById('copyBtn').textContent = '📋 Copy Name';
            document.getElementById('copyBtn').classList.remove('copied');

            // Update stats
            updateStats();

            return fullName;
        }

        // Copy to clipboard
        function copyToClipboard() {
            const name = document.getElementById('generatedName').textContent;
            navigator.clipboard.writeText(name).then(() => {
                const copyBtn = document.getElementById('copyBtn');
                copyBtn.textContent = '✅ Copied!';
                copyBtn.classList.add('copied');
                setTimeout(() => {
                    copyBtn.textContent = '📋 Copy Name';
                    copyBtn.classList.remove('copied');
                }, 2000);
            });
        }

        // Update stats
        let generatedCount = 0;
        function updateStats() {
            generatedCount++;
            document.getElementById('totalNames').textContent = generatedCount;
        }

        // Event listeners
        document.getElementById('generateBtn').addEventListener('click', generateName);
        document.getElementById('copyBtn').addEventListener('click', copyToClipboard);

        // Initialize
        populateCountries();
        populateLanguages();

        // Generate first random name on load
        generateName();
